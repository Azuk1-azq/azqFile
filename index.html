<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>azqFile - 共有アップローダー</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark"><span>azq</span></div>
    <span class="logo-name">azqFile</span>
    <span class="logo-badge">beta</span>
  </div>

  <div id="uploadContainer">
    <div class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="ファイルをドロップまたはクリックして選択">
      <i class="ti ti-upload drop-icon" aria-hidden="true"></i>
      <p class="drop-title">ファイルをドラッグ＆ドロップ</p>
      <p class="drop-sub">すべての形式に対応</p>
      <button class="browse-btn" id="browseBtn" type="button">ファイルを選択</button>
      <input type="file" id="fileInput" multiple style="display:none;">
    </div>

    <div class="file-list" id="fileList"></div>

    <div class="form-section" id="formSection" style="display:none;">
      <div class="form-group">
        <label for="senderName">アップロード者（任意）</label>
        <input type="text" id="senderName" placeholder="例: 太郎、匿名さん">
      </div>
      <div class="form-group">
        <label for="msgNote">ファイルの説明（任意）</label>
        <textarea id="msgNote" placeholder="ダウンロードする人に伝えるメモなど"></textarea>
      </div>
    </div>

    <div class="warn-box" id="warnBox" style="display:none;">
      <i class="ti ti-alert-triangle" aria-hidden="true"></i>
      <span id="warnText"></span>
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">
        <span id="progressText">アップロード中...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-file" id="progressFile"></div>
    </div>

    <button class="send-btn" id="sendBtn" type="button" disabled>
      <i class="ti ti-cloud-upload" aria-hidden="true"></i>
      ファイルをアップロードする
    </button>
  </div>

  <div class="download-panel" id="downloadPanel">
    <i class="ti ti-file dl-file-icon" id="dlFileIcon" style="font-size: 48px;"></i>
    <div class="dl-file-name" id="dlFileName">ファイル名</div>
    <div class="dl-file-info" id="dlFileInfo">サイズ: -- | 投稿者: --</div>
    <div style="font-size: 13px; color:#666; margin: 4px 0 10px 0; text-align: left; background: #fafaf8; padding: 10px; border-radius: 6px; border:0.5px solid #eee;" id="dlFileNote"></div>
    
    <button class="dl-start-btn" id="dlStartBtn">
      <i class="ti ti-download"></i> ダウンロードを開始
    </button>
  </div>

  <div class="success-box" id="successBox">
    <div class="success-title">
      <i class="ti ti-circle-check" style="font-size:20px;"></i>
      <span>アップロードが完了しました！</span>
    </div>
    <div id="issuedUrlList"></div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <footer>azqFile &mdash; 手軽にファイル共有</footer>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
